services:
  - type: web
    name: dacby-assignment-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: MONGODB_URI
        sync: false
      - key: SCHEDULER_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
